services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: db_nuconnect
      TZ: Asia/Manila
      PGTZ: Asia/Manila
    volumes:
      - ./nuconnect_files/postgres_volume:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - my-network
    restart: no

  valkey:
    image: valkey/valkey:9.0.2
    container_name: valkey
    ports:
      - "6379:6379"
    volumes:
      - ./data:/data
    command: ["valkey-server", "--save", "60", "1"]
    networks:
      - my-network
    restart: no

networks:
  my-network:
    name: networks
    driver: bridge
