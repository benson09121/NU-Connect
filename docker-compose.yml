services:

  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      TZ: Asia/Manila
    container_name: mysql
    image: mysql:8.4.6
    volumes:
      - mysql_volume:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql/my.cnf:/etc/mysql/my.cnf
    ports:
      - "3307:3306"
    networks:
      - my-network
    restart: unless-stopped

  node-app:
    container_name: node-app
    build: ./node-app
    shm_size: '2gb'
    environment:
      TZ: Asia/Manila
      OPENROUTER_API_KEY: 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
      NODE_ENV: "production"
    volumes:
      - /opt/certificates/templates:/app/certificates/templates
      - /opt/certificates/generated:/app/certificates/generated
      - /opt/requirements:/app/requirements
      - /opt/organizations:/app/organizations
      - /opt/applications:/app/applications
      - /opt/events:/app/events
      # Facebook Scraper persistent storage
      - facebook_auth:/app/.auth
      - crawlee_storage:/app/storage
      - playwright_cache:/root/.cache/ms-playwright
    networks:
      - my-network
    ports:
      - "3001:3000"
    restart: unless-stopped
    depends_on:
      - mysql
    develop:
      watch:
        - action: sync
          path: ./node-app
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: package.json     

  nginx:
    container_name: nginx
    build: ./react-app  
    volumes:
      - /opt/certificates/generated:/usr/share/nginx/html/certificates/generated
      - /opt/certificates/templates:/usr/share/nginx/html/certificates/templates
      - /opt/requirements:/usr/share/nginx/html/requirements
      - /opt/organizations:/usr/share/nginx/html/organizations
      - /opt/applications:/usr/share/nginx/html/applications
      - /opt/events:/usr/share/nginx/html/events
    ports:
      - "8080:80"
    networks:
      - my-network
    depends_on:
      - node-app
    restart: unless-stopped

  redis:
    image: redis:8.0-M01
    container_name: redis
    command: redis-server --requirepass redis_password_nuconnect
    ports:
      - "6380:6379"
    volumes:
      - redis_volume:/data
    networks:
      - my-network
    restart: unless-stopped
  
  # flask_app:
  #   container_name: flask
  #   build: ./converter
  #   ports:
  #     - "5000:5000"
  #   environment:
  #     - FLASK_ENV=production
  #   networks:
  #     - my-network

networks:
  my-network:
      name: networks
      driver: bridge

volumes:
  mysql_volume:
  redis_volume:
  # Facebook Scraper volumes
  facebook_auth:
  crawlee_storage:
  playwright_cache:
  # clamav_data:
