<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preload critical resources -->
    <link rel="preload" href="/images/NFC Logo.png" as="image" type="image/png" />
    <link rel="preload" href="/images/NU-Connect.png" as="image" type="image/png" />
    <link rel="preload" href="/images/nu-building.jpg" as="image" />
    
    <!-- Preload critical CSS for faster loading -->
    <link rel="preload" href="https://unpkg.com/@mantine/core@7.12.2/styles.css" as="style" />
    <link rel="preload" href="https://unpkg.com/@mantine/dates@7.12.2/styles.css" as="style" />
    <link rel="preload" href="https://unpkg.com/mantine-react-table@2.0.0-beta.6/styles.css" as="style" />
    
    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//fonts.gstatic.com" />
    <link rel="dns-prefetch" href="//unpkg.com" />
    <link rel="dns-prefetch" href="//cdn.jsdelivr.net" />
    
    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />    <!-- Critical CSS inlined for instant loading -->
    <style>
      /* Critical above-the-fold styles */
      body {
        margin: 0;
        font-family: 'Inter-Regular', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background-color: #f5f5fa;
        color: #1E1E1E;
        line-height: 1.2;
      }
      #root { min-height: 100vh; }

      /* Consistent loading styles used across the app */
      .app-loading {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #f5f5fa;
      }

      .app-loading-content {
        text-align: center;
      }

      .app-loading-logo {
        width: 60px;
        height: 60px;
        margin-bottom: 20px;
        opacity: 0;
        animation: fadeIn 0.5s ease-out forwards;
      }

      .app-loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e0e0e0;
        border-top: 3px solid #4e59c9;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
        opacity: 0;
        animation: fadeIn 0.5s ease-out 0.2s forwards, spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes fadeIn {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      /* Hide initial loading for returning visitors */
      .skip-loading .initial-loading {
        display: none !important;
      }
    </style>

    <link rel="icon" type="image/svg+xml" href="/images/NFC Logo.png" />

    <!-- Load fonts async -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />

    <title>NU Connect</title>

    <!-- Check if first visit -->
    <script>
      // Check if user has visited before
      if (localStorage.getItem('nu-connect-visited')) {
        document.documentElement.classList.add('skip-loading');
      }

      // Remove initial loading as soon as React starts
      window.addEventListener('load', () => {
        setTimeout(() => {
          const initialLoading = document.querySelector('.initial-loading');
          if (initialLoading) {
            initialLoading.remove();
          }
        }, 100);
      });
    </script>
    <script type="module" crossorigin src="/assets/index-C3TOdSRk.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Dq_UOLIq.css">
  </head>
  <body>
    <!-- Add immediate loading indicator -->
    <div id="root">
      <div class="initial-loading app-loading">
        <div class="app-loading-content">
          <img src="/images/NFC Logo.png" alt="NU Connect" class="app-loading-logo" />
          <div class="app-loading-spinner"></div>
        </div>
      </div>
    </div>

    <!-- Defer non-critical JS -->
  </body>
</html>
