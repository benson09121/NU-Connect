    <style>
      /* Critical above-the-fold styles */
      body {
        margin: 0;
        font-family: 'Inter-Regular', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background-color: #f5f5fa;
        color: #1E1E1E;
        line-height: 1.2;
      }
      #root { min-height: 100vh; }

      /* Consistent loading styles used across the app */
      .app-loading {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #f5f5fa;
      }

      .app-loading-content {
        text-align: center;
      }

      .app-loading-logo {
        width: 60px;
        height: 60px;
        margin-bottom: 20px;
        opacity: 0;
        animation: fadeIn 0.5s ease-out forwards;
      }

      .app-loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e0e0e0;
        border-top: 3px solid #4e59c9;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto;
        opacity: 0;
        animation: fadeIn 0.5s ease-out 0.2s forwards, spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes fadeIn {
        0% { opacity: 0; transform: translateY(10px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      /* Hide initial loading for returning visitors */
      .skip-loading .initial-loading {
        display: none !important;
      }
    </style>

    <title>NU Connect - Student Organization Management System | National University Dasmarinas</title>

    <!-- Check if first visit -->
    <script>
      // Check if user has visited before
      if (localStorage.getItem('nu-connect-visited')) {
        document.documentElement.classList.add('skip-loading');
      }

      // Remove initial loading as soon as React starts
      window.addEventListener('load', () => {
        setTimeout(() => {
          const initialLoading = document.querySelector('.initial-loading');
          if (initialLoading) {
            initialLoading.remove();
          }
        }, 100);
      });
    </script>
