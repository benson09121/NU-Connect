server {
	listen 80 default_server;
    listen [::]:80 default_server;
	server_name localhost;

	# ====================================
	# 🔒 OWASP SECURITY HEADERS (Complete)
	# ====================================
	
	# Prevent clickjacking
	add_header X-Frame-Options "SAMEORIGIN" always;
	
	# Prevent MIME-sniffing
	add_header X-Content-Type-Options "nosniff" always;
	
	# Referrer policy
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;
	
	# Permissions policy (restrict features)
	add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
	
	# HSTS - Force HTTPS (1 year)
	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
	
	# Prevent IE from opening downloads
	add_header X-Download-Options "noopen" always;
	
	# XSS Protection
	add_header X-XSS-Protection "1; mode=block" always;
	
	# Content Security Policy - Secure configuration with CDN support
	add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://admin.nuconnect.net wss://admin.nuconnect.net http://localhost:3000 http://localhost:5173 http://localhost:8080; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;
	
	# Hide server information
	add_header X-Powered-By "" always;
	proxy_hide_header X-Powered-By;
	server_tokens off;
	
	# File upload size limit
	client_max_body_size 100M;

	root /usr/share/nginx/html;

	index index.html index.htm index.nginx-debian.html;
	
    location ^~ //.well-known/ {
        allow all;  # Override any default deny rules
        default_type application/json;
        try_files $uri =404;

        # Inherit security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

	# SPA routing: serve files if they exist, otherwise fall back to React's index.html
	location / {
		# Important: don't try $uri/ (directories). If a folder like /events exists without an index,
		# Nginx may return 403. Falling back to @react ensures React Router handles the route.
		try_files $uri @react;
	}

	# Fallback handler for client-side routes (e.g., /events, /organizations)
	location @react {
		add_header Cache-Control "no-store";
		try_files /index.html =404;
	}

	# ====================================
	# 📤 FILE UPLOAD ENDPOINTS
	# ====================================
	
	# E-Signature Upload - Optimized for multipart/form-data
	location /api/web/esignature/upload {
		proxy_pass http://node-app:3000/api/web/esignature/upload;
		
		# Preserve all request headers and body
		proxy_pass_request_headers on;
		proxy_pass_request_body on;
		
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		
		# CRITICAL: Preserve original Content-Type with boundary
		proxy_set_header Content-Type $content_type;
		proxy_set_header Content-Length $content_length;
		
		# Critical for file uploads - NO BUFFERING
		client_max_body_size 10M;
		client_body_buffer_size 128k;
		client_body_temp_path /tmp/client_body_temp;
		
		proxy_request_buffering off;
		proxy_buffering off;
		proxy_http_version 1.1;
		
		# Timeouts for upload
		proxy_connect_timeout 300s;
		proxy_send_timeout 300s;
		proxy_read_timeout 300s;
		
		# Hide backend CORS headers
		proxy_hide_header Access-Control-Allow-Origin;
		proxy_hide_header Access-Control-Allow-Methods;
		proxy_hide_header Access-Control-Allow-Headers;
		proxy_hide_header X-Powered-By;
		
		# Dynamic CORS
		set $cors_origin "";
		if ($http_origin ~* ^https?://(localhost|127\.0\.0\.1):(3000|5173|8080)$) {
			set $cors_origin $http_origin;
		}
		if ($http_origin = "https://admin.nuconnect.net") {
			set $cors_origin $http_origin;
		}
		
		add_header Access-Control-Allow-Origin $cors_origin always;
		add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
		add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
		add_header Access-Control-Max-Age "86400" always;
		
		# Preflight
		if ($request_method = 'OPTIONS') {
			add_header Access-Control-Allow-Origin $cors_origin;
			add_header Access-Control-Allow-Methods "POST, OPTIONS";
			add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With";
			add_header Content-Length 0;
			return 204;
		}
	}
	
	# General file upload endpoint (requirements, documents, etc.)
	location ~ ^/api/web/.*/upload$ {
		proxy_pass http://node-app:3000;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		
		# File upload handling
		client_max_body_size 50M;
		client_body_buffer_size 10M;
		proxy_request_buffering off;
		proxy_buffering off;
		proxy_http_version 1.1;
		
		# Timeouts
		proxy_connect_timeout 300s;
		proxy_send_timeout 300s;
		proxy_read_timeout 300s;
		
		# CORS setup (same as above)
		proxy_hide_header Access-Control-Allow-Origin;
		proxy_hide_header Access-Control-Allow-Methods;
		proxy_hide_header Access-Control-Allow-Headers;
		proxy_hide_header X-Powered-By;
		
		set $cors_origin "";
		if ($http_origin ~* ^https?://(localhost|127\.0\.0\.1):(3000|5173|8080)$) {
			set $cors_origin $http_origin;
		}
		if ($http_origin = "https://admin.nuconnect.net") {
			set $cors_origin $http_origin;
		}
		
		add_header Access-Control-Allow-Origin $cors_origin always;
		add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
		add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
		add_header Access-Control-Max-Age "86400" always;
		
		if ($request_method = 'OPTIONS') {
			add_header Access-Control-Allow-Origin $cors_origin;
			add_header Access-Control-Allow-Methods "POST, OPTIONS";
			add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With";
			add_header Content-Length 0;
			return 204;
		}
	}

	location /api/ {
		proxy_pass http://node-app:3000/api/;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection 'upgrade';
		proxy_cache_bypass $http_upgrade;
		
		# File upload handling
		client_body_buffer_size 10M;
		proxy_request_buffering off;
		proxy_buffering off;
		proxy_read_timeout 300s;
		proxy_connect_timeout 75s;
		
		# Hide backend CORS headers to avoid duplicates
		proxy_hide_header Access-Control-Allow-Origin;
		proxy_hide_header Access-Control-Allow-Methods;
		proxy_hide_header Access-Control-Allow-Headers;
		proxy_hide_header Access-Control-Max-Age;
		proxy_hide_header Access-Control-Allow-Credentials;
		proxy_hide_header X-Powered-By;
		
		# ====================================
		# 🔒 SECURE CORS CONFIGURATION
		# ====================================
		
		# Dynamic CORS handling
		set $cors_origin "";
		
		# Development: Allow localhost
		if ($http_origin ~* ^https?://(localhost|127\.0\.0\.1|192\.168\.\d+\.\d+):(3000|5173|8080)$) {
			set $cors_origin $http_origin;
		}
		
		# Production: Allow your domain
		if ($http_origin = "https://admin.nuconnect.net") {
			set $cors_origin $http_origin;
		}
		
		# Mobile apps (no origin header) - REJECT by default, mobile should authenticate via JWT
		# If origin is empty/null, don't set CORS (backend JWT auth will handle it)
		# Removed wildcard (*) for security - mobile apps work without CORS headers
		
		# Apply CORS headers
		add_header Access-Control-Allow-Origin $cors_origin always;
		add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
		add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, x-api-key, Ocp-Apim-Subscription-Key, type, x-request-timeout, X-Request-Timeout, X-Client-Timeout, x-client-timeout" always;
		add_header Access-Control-Max-Age "86400" always;
		
		# Handle preflight requests
		if ($request_method = 'OPTIONS') {
			add_header Access-Control-Allow-Origin $cors_origin;
			add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
			add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, x-api-key, Ocp-Apim-Subscription-Key, type, x-request-timeout, X-Request-Timeout, X-Client-Timeout, x-client-timeout";
			add_header Access-Control-Max-Age "86400";
			add_header Content-Length 0;
			return 204;
		}
	}
    


