		proxy_hide_header Access-Control-Allow-Credentials;
		proxy_hide_header X-Powered-By;
		
		# Dynamic CORS handling
		set $cors_origin "";
		
		# Development: Allow localhost
		if ($http_origin ~* ^https?://(localhost|127\.0\.0\.1|192\.168\.\d+\.\d+):(3000|5173|8080)$) {
			set $cors_origin $http_origin;
		}
		
		# Production: Allow your domain
		if ($http_origin = "https://admin.nuconnect.net") {
			set $cors_origin $http_origin;
		}
		
		# Mobile apps (no origin header) - Don't set wildcard CORS
		# Mobile apps work without CORS, backend JWT handles authentication
		
		add_header Access-Control-Allow-Origin $cors_origin always;
		add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
		add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, x-api-key, Ocp-Apim-Subscription-Key" always;
    add_header Access-Control-Max-Age "86400" always;
		
		# Handle preflight requests
		if ($request_method = 'OPTIONS') {
			add_header Access-Control-Allow-Origin $cors_origin;
			add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
			add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, x-api-key, Ocp-Apim-Subscription-Key";
			add_header Access-Control-Max-Age "86400";
			add_header Content-Length 0;
			return 204;
		}
	}


    location /protected-certificates/ {
		internal;
		alias /usr/share/nginx/html/certificates/;

		# CORS for certificates
		set $cors_origin "";
		if ($http_origin = "http://localhost:5173") {
			set $cors_origin $http_origin;
		}
		if ($http_origin = "https://admin.nuconnect.net") {
			set $cors_origin $http_origin;
		}
		
		add_header 'Access-Control-Allow-Origin' $cors_origin always;
		add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
		add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;

		if ($request_method = 'OPTIONS') {
			add_header 'Access-Control-Max-Age' 1728000;
			add_header 'Content-Type' 'text/plain charset=UTF-8';
			add_header 'Content-Length' 0;
			return 204;
		}
	}

	location /protected-esignatures/ {
		internal;
		alias /usr/share/nginx/html/esignatures/;

		# Allow only image types for e-signatures
		types {
			image/png                png;
			image/jpeg               jpg jpeg;
		}

		# Dynamic CORS for e-signatures
		set $cors_origin "";
		if ($http_origin = "http://localhost:5173") {
			set $cors_origin $http_origin;
		}
		if ($http_origin = "http://localhost:8080") {
			set $cors_origin $http_origin;
		}
		if ($http_origin = "https://admin.nuconnect.net") {
			set $cors_origin $http_origin;
		}
		
		add_header 'Access-Control-Allow-Origin' $cors_origin always;
		add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
		add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;

		# Security headers
		add_header X-Content-Type-Options "nosniff" always;
		add_header X-Frame-Options "DENY" always;

		# Handle preflight requests
		if ($request_method = 'OPTIONS') {
			add_header 'Access-Control-Max-Age' 1728000;
			add_header 'Content-Type' 'text/plain charset=UTF-8';
			add_header 'Content-Length' 0;
			return 204;
		}
	}

