    location ~* (\.env|\.git|\.htaccess) {
        deny all;
        return 404;
    }

	    location ~* \.(js|css|gif|ico|svg|woff2?)$ {
        expires 5d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

	location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

}

