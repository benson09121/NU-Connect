server {
	listen 80 default_server;
    listen [::]:80 default_server;
	server_name localhost;

	# OWASP Security Headers
	add_header X-Frame-Options "DENY" always;
	add_header X-Content-Type-Options "nosniff" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;
	add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
	add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
	add_header X-Download-Options "noopen" always;
	
	# Hide server information leakage
	add_header X-Powered-By "" always;
	proxy_hide_header X-Powered-By;
	
	# Content Security Policy - Adjust domains as needed for your app
	add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'none';" always;
	
	client_max_body_size 50M;
	server_tokens off;


	root /usr/share/nginx/html;

	index index.html index.htm index.nginx-debian.html;
	
    location ^~ //.well-known/ {
        allow all;  # Override any default deny rules
        default_type application/json;
        try_files $uri =404;

        # Inherit security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

	# SPA routing: serve files if they exist, otherwise fall back to React's index.html
	location / {
		# Important: don't try $uri/ (directories). If a folder like /events exists without an index,
		# Nginx may return 403. Falling back to @react ensures React Router handles the route.
		try_files $uri @react;
	}

	# Fallback handler for client-side routes (e.g., /events, /organizations)
	location @react {
		add_header Cache-Control "no-store";
		try_files /index.html =404;
	}

	location /api/ {
		proxy_pass http://node-app:3000;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection 'upgrade';
		proxy_cache_bypass $http_upgrade;
		
		# Hide backend CORS headers to avoid duplicates
		proxy_hide_header Access-Control-Allow-Origin;
		proxy_hide_header Access-Control-Allow-Methods;
		proxy_hide_header Access-Control-Allow-Headers;
		proxy_hide_header Access-Control-Max-Age;
		proxy_hide_header Access-Control-Allow-Credentials;
		proxy_hide_header X-Powered-By;
		
		# Dynamic CORS handling for web and mobile
		set $cors_origin "";
		if ($http_origin ~* ^https?://(localhost|127\.0\.0\.1|192\.168\.\d+\.\d+):(3000|5173|8080)$) {
			set $cors_origin $http_origin;
		}
		# Allow Flutter mobile app (no origin header or null)
		if ($http_origin = "") {
			set $cors_origin "*";
		}
		if ($http_origin = "null") {
			set $cors_origin "*";
		}
		# Add your production domains here
		if ($http_origin ~* ^https://(your-production-domain\.com|your-app\.azurewebsites\.net)$) {
			set $cors_origin $http_origin;
		}
		
		add_header Access-Control-Allow-Origin $cors_origin always;
		add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
		add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, x-api-key, Ocp-Apim-Subscription-Key, type, x-request-timeout, X-Request-Timeout, X-Client-Timeout, x-client-timeout" always;
		add_header Access-Control-Max-Age "86400" always;
		
		# Handle preflight requests
		if ($request_method = 'OPTIONS') {
			add_header Access-Control-Allow-Origin $cors_origin;
			add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
			add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, x-api-key, Ocp-Apim-Subscription-Key, type, x-request-timeout, X-Request-Timeout, X-Client-Timeout, x-client-timeout";
			add_header Access-Control-Max-Age "86400";
			add_header Content-Length 0;
			return 204;
		}
	}
    


	location /api/web/get-requirements/ {
		proxy_pass http://node-app:3000/api/web/requirements/;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		
		# Hide backend CORS headers to avoid duplicates
		proxy_hide_header Access-Control-Allow-Origin;
		proxy_hide_header Access-Control-Allow-Methods;
		proxy_hide_header Access-Control-Allow-Headers;
		proxy_hide_header Access-Control-Max-Age;
		proxy_hide_header Access-Control-Allow-Credentials;
		proxy_hide_header X-Powered-By;
		
		# Dynamic CORS handling for web and mobile
		set $cors_origin "";
        if ($http_origin ~* ^https?://(localhost|127\.0\.0\.1|192\.168\.\d+\.\d+):(3000|5173|8080)$) {
            set $cors_origin $http_origin;
        }
		# Allow Flutter mobile app (no origin header or null)
		if ($http_origin = "") {
			set $cors_origin "*";
		}
		if ($http_origin = "null") {
			set $cors_origin "*";
		}
        # Add your production domains here
        if ($http_origin ~* ^https://admin.nuconnect.net$) {
            set $cors_origin $http_origin;
        }
		
		add_header Access-Control-Allow-Origin $cors_origin always;
		add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
		add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, x-api-key, Ocp-Apim-Subscription-Key" always;
    add_header Access-Control-Max-Age "86400" always;
		
		# Handle preflight requests
		if ($request_method = 'OPTIONS') {
			add_header Access-Control-Allow-Origin $cors_origin;
			add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
			add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, x-api-key, Ocp-Apim-Subscription-Key";
			add_header Access-Control-Max-Age "86400";
			add_header Content-Length 0;
			return 204;
		}
	}


    location /protected-certificates/ {
    internal;
    alias /usr/share/nginx/html/certificates/;

        add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always; 
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    location /protected-requirements/ {
        internal;
        alias /usr/share/nginx/html/requirements/;

        # Add CORS headers here
        add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

        location /protected-organization-requirements/ {
        internal;
        alias /usr/share/nginx/html/organizations/;

        # Allow all file types (including images)
        types {
            image/png                png;
            image/jpeg               jpg jpeg;
            application/pdf          pdf;
            application/msword       doc;
            application/vnd.openxmlformats-officedocument.wordprocessingml.document docx;
            application/vnd.ms-excel xls;
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet xlsx;
            # Add more as needed
        }

        # Add CORS headers here
        add_header 'Access-Control-Allow-Origin' 'http://localhost:5173' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

